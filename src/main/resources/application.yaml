spring:
  application:
    name: heliophysics-engine
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/cosmicpulse}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
nasa:
  api:
    key: ${NASA_API_KEY:cFVWJWrRe4LnLCrV51mkY89TJoYlsBDW3ZEEUNJ6}
    base-url: https://api.nasa.gov
noaa:
  api:
    base-url: https://services.swpc.noaa.gov
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
logging:
  level:
    com.cosmicpulse: INFO
server:
  port: ${PORT:8080}
